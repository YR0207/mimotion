name: 刷步数

on:
  schedule:
    - cron: '58 23 * * *'   # 每天23:58运行
  workflow_dispatch:        # 支持手动触发
    inputs:
      retry_count:
        description: '重试次数（内部使用，请勿手动修改）'
        required: false
        default: '0'

env:
  MAX_RETRIES: 3            # 最大重试次数

jobs:
  main:
    runs-on: ubuntu-latest
    timeout-minutes: 2      # 超时5分钟，超时后job将被取消
    steps:
      - name: Checkout codes
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT }}

      - name: Update system and install zsh
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get install zsh -y

      - name: 初始化Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: 开始
        env:
          CONFIG: ${{ secrets.CONFIG }}
          AES_KEY: ${{ secrets.AES_KEY }}
          BARK_KEY: ${{ secrets.BARK_KEY }}
        run: |
          pip3 install requests pytz pycryptodome
          python3 main.py 2>&1 | tee script_output.log
          echo "Python脚本执行完成"

      - name: persist tokens
        run: |
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git add .
          git commit -m "persist tokens trigger by ${{ github.event_name }}"
          git push origin master

  # 重试Job：检查主Job是否失败或超时，若是则重新触发工作流
  retry:
    runs-on: ubuntu-latest
    needs: main
    if: always()   # 无论主Job成功、失败、取消都执行，以便检查是否需要重试
    steps:
      - name: 获取当前重试次数
        id: get_retry
        run: |
          if [ "${{ github.event.inputs.retry_count }}" != "" ]; then
            echo "count=${{ github.event.inputs.retry_count }}" >> $GITHUB_OUTPUT
          else
            echo "count=0" >> $GITHUB_OUTPUT
          fi

      - name: 检查是否需要重试
        id: check
        run: |
          # 判断主Job是否失败或超时（状态为failure或cancelled）
          if [[ "${{ needs.main.result }}" == "failure" || "${{ needs.main.result }}" == "cancelled" ]]; then
            echo "主Job状态: ${{ needs.main.result }}，需要重试"
          else
            echo "主Job成功，无需重试"
            exit 0
          fi
          
          RETRY_COUNT=${{ steps.get_retry.outputs.count }}
          if [ $RETRY_COUNT -ge $MAX_RETRIES ]; then
            echo "已达到最大重试次数 ($MAX_RETRIES)，不再重试"
            exit 0
          fi
          echo "继续重试，当前次数: $RETRY_COUNT"

      - name: 重新触发工作流
        if: steps.check.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          NEW_RETRY_COUNT=$(( ${{ steps.get_retry.outputs.count }} + 1 ))
          echo "重试次数: $NEW_RETRY_COUNT"
          gh workflow run "${{ github.workflow }}" \
            --ref "${{ github.ref }}" \
            -f retry_count="$NEW_RETRY_COUNT"
