name: 刷步数

on:
  schedule:
    - cron: '57 23 * * *'   # 修正为北京时间 23:57 (UTC 15:57)
  workflow_dispatch:
    inputs:
      retry_count:
        description: '重试次数（内部使用，请勿手动修改）'
        required: false
        default: '0'

env:
  MAX_RETRIES: 2

jobs:
  main:
    runs-on: ubuntu-latest
    # 移除 Job 级别的超时限制，改为仅针对“开始”步骤
    # timeout-minutes: 6
    steps:
      - name: Checkout codes
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT }}

      - name: Update system and install zsh
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get install zsh -y

      - name: 初始化Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      # ---------------------------------------------------------------
      # 修改点 1：给“开始”步骤添加 id、超时控制，并允许失败后继续
      # ---------------------------------------------------------------
      - name: 开始
        id: run_script          # 给步骤起个 ID，方便后续引用状态
        timeout-minutes: 5      # 仅针对此步骤设置超时时间 (例如 5 分钟)
        continue-on-error: true # 关键：即使此步骤失败/超时，也继续执行后续步骤
        env:
          CONFIG: ${{ secrets.CONFIG }}
          AES_KEY: ${{ secrets.AES_KEY }}
          BARK_KEY: ${{ secrets.BARK_KEY }}
        run: |
          pip3 install requests pytz pycryptodome
          python3 main.py 2>&1 | tee script_output.log
          echo "Python脚本执行完成"

      # ---------------------------------------------------------------
      # 修改点 2：新增步骤，专门记录“开始”步骤的执行结果
      # ---------------------------------------------------------------
      - name: 记录脚本执行状态
        id: record_status
        run: |
          # 获取“开始”步骤的结论 (conclusion)
          # 可能的值: success, failure, cancelled, skipped
          SCRIPT_CONCLUSION=${{ steps.run_script.conclusion }}
          
          echo "脚本执行状态: $SCRIPT_CONCLUSION"
          
          # 将状态写入文件，以便后续 retry Job 读取判断
          echo "$SCRIPT_CONCLUSION" > script_status.txt
          
          # 同时也将状态输出到 GITHUB_OUTPUT，虽然这里我们主要用文件方式
          echo "status=$SCRIPT_CONCLUSION" >> $GITHUB_OUTPUT

      - name: persist tokens
        run: |
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          # 显式添加我们需要的文件 (日志和状态文件)，避免 git add . 的风险
          git add script_output.log script_status.txt
          # 如果有其他 token 文件需要提交，请在这里添加，例如：
          # git add tokens.json
          
          # 只有当有变更时才 commit，避免报错 (虽然 git commit -a 可以处理，但为了稳妥)
          git diff --quiet && git diff --staged --quiet || (git commit -m "persist tokens and logs trigger by ${{ github.event_name }}" && git push origin master)

  retry:
    runs-on: ubuntu-latest
    needs: main
    if: always() # 无论 main Job 成功与否都过来检查一下
    steps:
      - name: Checkout codes
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT }}

      - name: 获取当前重试次数
        id: get_retry
        run: |
          if [ "${{ github.event.inputs.retry_count }}" != "" ]; then
            echo "count=${{ github.event.inputs.retry_count }}" >> $GITHUB_OUTPUT
          else
            echo "count=0" >> $GITHUB_OUTPUT
          fi

      # ---------------------------------------------------------------
      # 修改点 3：修改检查逻辑，读取文件状态而非 Job 状态
      # ---------------------------------------------------------------
      - name: 检查是否需要重试
        id: check
        run: |
          # 1. 读取上一步写入的状态文件
          if [ -f "script_status.txt" ]; then
            SCRIPT_CONCLUSION=$(cat script_status.txt)
            echo "读取到脚本状态: $SCRIPT_CONCLUSION"
          else
            SCRIPT_CONCLUSION="not_found"
            echo "未找到状态文件，视为无需重试"
          fi

          NEED_RETRY=false

          # 2. 判断状态是否为失败 (failure) 或 取消 (cancelled，通常由超时引起)
          if [[ "$SCRIPT_CONCLUSION" == "failure" || "$SCRIPT_CONCLUSION" == "cancelled" ]]; then
            echo "检测到脚本步骤失败或超时，考虑重试..."
            RETRY_COUNT=${{ steps.get_retry.outputs.count }}
            
            # 3. 检查是否超过最大重试次数
            if [ $RETRY_COUNT -ge $MAX_RETRIES ]; then
              echo "已达到最大重试次数 ($MAX_RETRIES)，不再重试"
              NEED_RETRY=false
            else
              echo "继续重试，当前次数: $RETRY_COUNT"
              NEED_RETRY=true
            fi
          else
            echo "脚本状态为 $SCRIPT_CONCLUSION，无需重试"
            NEED_RETRY=false
          fi

          echo "should_retry=$NEED_RETRY" >> $GITHUB_OUTPUT

      - name: 重新触发工作流
        if: steps.check.outputs.should_retry == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          NEW_RETRY_COUNT=$(( ${{ steps.get_retry.outputs.count }} + 1 ))
          echo "重试次数: $NEW_RETRY_COUNT"
          gh workflow run "${{ github.workflow }}" \
            --ref "${{ github.ref }}" \
            -f retry_count="$NEW_RETRY_COUNT"