name: 刷步数

on:
  schedule:
    - cron: '57 15 * * *'   # 北京时间 23:57
  workflow_dispatch:
    inputs:
      retry_count:
        description: '重试次数（内部使用，请勿手动修改）'
        required: false
        default: '0'

env:
  MAX_RETRIES: 2
  # 定义 Artifact 名称，用于传递状态
  STATUS_ARTIFACT_NAME: workflow-status-artifact

jobs:
  main:
    runs-on: ubuntu-latest
    outputs:
      # 将状态通过 Job outputs 传递一份，作为 Artifact 的兜底
      script_status: ${{ steps.record_status.outputs.status }}
    steps:
      - name: Checkout codes
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT }}

      - name: 初始化Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      # 1. 执行脚本步骤
      - name: 开始
        id: run_script
        timeout-minutes: 5
        continue-on-error: true # 即使失败也继续，以便记录状态
        env:
          CONFIG: ${{ secrets.CONFIG }}
          AES_KEY: ${{ secrets.AES_KEY }}
          BARK_KEY: ${{ secrets.BARK_KEY }}
        run: |
          pip3 install requests pytz pycryptodome
          python3 main.py 2>&1 | tee script_output.log

      # 2. 记录状态（不仅写文件，也写到 Job Outputs）
      - name: 记录脚本执行状态
        id: record_status
        run: |
          SCRIPT_CONCLUSION=${{ steps.run_script.conclusion }}
          echo "脚本执行结果 (Conclusion): $SCRIPT_CONCLUSION"
          
          # 写入文件
          echo "$SCRIPT_CONCLUSION" > script_status.txt
          
          # 同时也写入 GITHUB_OUTPUT，作为 Job 的输出
          echo "status=$SCRIPT_CONCLUSION" >> $GITHUB_OUTPUT

      # 3. 上传日志和状态作为 Artifact (供 retry Job 读取)
      - name: 上传状态文件
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.STATUS_ARTIFACT_NAME }}
          path: |
            script_status.txt
            script_output.log
          retention-days: 1 # 只保留1天即可，不需要长期存

      # 4. 持久化 Tokens (只做这一件事，与状态解耦)
      - name: persist tokens
        run: |
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          # 【重要】只提交你真正需要持久化的业务文件，例如 token.json
          # 不要提交 script_status.txt 或 script_output.log
          # git add tokens.json 
          # git diff --quiet && git diff --staged --quiet || (git commit -m "Update tokens" && git push origin master)
          echo "跳过 Git 提交演示，请根据实际情况取消注释并修改文件路径"

  retry:
    runs-on: ubuntu-latest
    needs: main
    if: always() # 无论成败都来检查一遍
    steps:
      - name: Checkout codes (为了 gh 命令能运行)
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT }}

      - name: 下载状态文件
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.STATUS_ARTIFACT_NAME }}
        continue-on-error: true # 即使下载失败也继续，走兜底逻辑

      - name: 获取当前重试次数
        id: get_retry
        run: |
          if [ "${{ github.event.inputs.retry_count }}" != "" ]; then
            echo "count=${{ github.event.inputs.retry_count }}" >> $GITHUB_OUTPUT
          else
            echo "count=0" >> $GITHUB_OUTPUT
          fi

      - name: 检查是否需要重试 (核心逻辑)
        id: check
        run: |
          # --- 1. 优先读取 Artifact 文件 ---
          if [ -f "script_status.txt" ]; then
            SCRIPT_CONCLUSION=$(cat script_status.txt)
            echo "从 Artifact 读取状态: $SCRIPT_CONCLUSION"
          else
            # --- 2. 兜底：读取 Job Outputs ---
            SCRIPT_CONCLUSION="${{ needs.main.outputs.script_status }}"
            echo "Artifact 丢失，从 Outputs 读取状态: $SCRIPT_CONCLUSION"
            
            # 如果两者都为空，说明主 Job 崩得太早，视为失败
            if [ -z "$SCRIPT_CONCLUSION" ]; then
              SCRIPT_CONCLUSION="failure"
              echo "无法获取状态，默认视为失败"
            fi
          fi

          NEED_RETRY=false
          IS_SPECIAL_CASE=false

          # --- 3. 判断逻辑 ---
          # 只有明确的 failure 或 cancelled 才考虑重试
          if [[ "$SCRIPT_CONCLUSION" == "failure" || "$SCRIPT_CONCLUSION" == "cancelled" ]]; then
            
            # 【防误判】检查是否是用户手动取消的
            # 如果整个 Workflow 的状态是 cancelled，通常意味着用户手动点了取消
            if [[ "${{ github.event_name }}" == "workflow_dispatch" && "$SCRIPT_CONCLUSION" == "cancelled" ]]; then
               echo "检测到手动触发流程被取消，不进行自动重试。"
               IS_SPECIAL_CASE=true
            fi

            if [[ "$IS_SPECIAL_CASE" == false ]]; then
              RETRY_COUNT=${{ steps.get_retry.outputs.count }}
              
              if [ $RETRY_COUNT -ge $MAX_RETRIES ]; then
                echo "已达最大重试次数 ($MAX_RETRIES)，停止。"
                NEED_RETRY=false
              else
                echo "状态异常 ($SCRIPT_CONCLUSION)，准备重试 (当前: $RETRY_COUNT)..."
                NEED_RETRY=true
              fi
            fi
          else
            echo "状态正常 ($SCRIPT_CONCLUSION)，无需重试。"
          fi

          echo "should_retry=$NEED_RETRY" >> $GITHUB_OUTPUT

      - name: 重新触发工作流
        if: steps.check.outputs.should_retry == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          NEW_RETRY_COUNT=$(( ${{ steps.get_retry.outputs.count }} + 1 ))
          echo "触发第 $NEW_RETRY_COUNT 次重试..."
          gh workflow run "${{ github.workflow }}" \
            --ref "${{ github.ref }}" \
            -f retry_count="$NEW_RETRY_COUNT"