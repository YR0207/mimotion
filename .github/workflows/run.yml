name: 刷步数

on:
  schedule:
    - cron: '58 23 * * *'
  workflow_dispatch:
    inputs:
      retry_count:
        description: '重试次数（内部使用，请勿手动修改）'
        required: false
        default: '0'

env:
  MAX_RETRIES: 3

jobs:
  main:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout codes
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT }}

      - name: Update system and install zsh
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get install zsh -y

      - name: 初始化Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: 开始
        env:
          CONFIG: ${{ secrets.CONFIG }}
          AES_KEY: ${{ secrets.AES_KEY }}
          BARK_KEY: ${{ secrets.BARK_KEY }}
        run: |
          pip3 install requests pytz pycryptodome
          python3 main.py 2>&1 | tee script_output.log
          echo "Python脚本执行完成"

      - name: persist tokens
        run: |
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git add .
          git commit -m "persist tokens trigger by ${{ github.event_name }}"
          git push origin master

  retry:
    runs-on: ubuntu-latest
    needs: main
    if: always()
    steps:
      - name: Checkout codes
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT }}

      - name: 获取当前重试次数
        id: get_retry
        run: |
          if [ "${{ github.event.inputs.retry_count }}" != "" ]; then
            echo "count=${{ github.event.inputs.retry_count }}" >> $GITHUB_OUTPUT
          else
            echo "count=0" >> $GITHUB_OUTPUT
          fi

      - name: 检查是否需要重试
        id: check
        run: |
          # 判断主Job是否失败或超时（状态为failure或cancelled）
          if [[ "${{ needs.main.result }}" == "failure" || "${{ needs.main.result }}" == "cancelled" ]]; then
            echo "主Job状态: ${{ needs.main.result }}，需要重试"
            NEED_RETRY=true
          else
            echo "主Job成功，无需重试"
            NEED_RETRY=false
          fi

          # 如果主Job需要重试，检查是否超过最大次数
          if [[ "$NEED_RETRY" == "true" ]]; then
            RETRY_COUNT=${{ steps.get_retry.outputs.count }}
            if [ $RETRY_COUNT -ge $MAX_RETRIES ]; then
              echo "已达到最大重试次数 ($MAX_RETRIES)，不再重试"
              NEED_RETRY=false
            else
              echo "继续重试，当前次数: $RETRY_COUNT"
            fi
          fi

          # 输出结果供后续步骤使用
          echo "should_retry=$NEED_RETRY" >> $GITHUB_OUTPUT

      - name: 重新触发工作流
        if: steps.check.outputs.should_retry == 'true'   # 仅在需要重试时执行
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          NEW_RETRY_COUNT=$(( ${{ steps.get_retry.outputs.count }} + 1 ))
          echo "重试次数: $NEW_RETRY_COUNT"
          gh workflow run "${{ github.workflow }}" \
            --ref "${{ github.ref }}" \
            -f retry_count="$NEW_RETRY_COUNT"
